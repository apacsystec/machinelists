<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Machine — Machine Registry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-brand">
      <span class="nav-icon">⬡</span>
      <span>MACHINE REGISTRY</span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">SEARCH</a>
      <a href="add.html" class="nav-link active">ADD MACHINE</a>
    </div>
  </nav>

  <section class="form-section">
    <div class="form-header">
      <div class="form-label">MACHINE SET</div>
      <h2 class="form-title">Add New Machine</h2>
      <p class="form-sub">กรอกข้อมูลชุดเครื่องจักรใหม่</p>
    </div>

    <!-- PREVIEW BADGE -->
    <div class="preview-box" id="previewBox">
      <span class="preview-label">PREVIEW</span>
      <span class="preview-name" id="previewName">— —</span>
    </div>

    <!-- FORM -->
    <div class="card form-card">
      <div class="form-grid">

        <div class="field-group">
          <label class="field-label" for="type">
            <span class="field-num">01</span> Type
          </label>
          <input type="text" id="type" class="field-input" placeholder="e.g. WAVE 224" />
        </div>

        <div class="field-group">
          <label class="field-label" for="articleNo">
            <span class="field-num">02</span> Article No.
          </label>
          <input type="text" id="articleNo" class="field-input" placeholder="e.g. ART-00123" />
        </div>

        <div class="field-group">
          <label class="field-label" for="serialNo">
            <span class="field-num">03</span> S/N
          </label>
          <input type="text" id="serialNo" class="field-input" placeholder="e.g. A08581" />
        </div>

        <div class="field-group">
          <label class="field-label" for="power">
            <span class="field-num">04</span> Power
          </label>
          <input type="text" id="power" class="field-input" placeholder="e.g. 220V / 50Hz" />
        </div>

      </div>

      <div class="form-actions">
        <button class="btn-secondary" id="resetBtn" type="button">CLEAR</button>
        <button class="btn-primary" id="submitBtn" type="button">
          <span id="submitLabel">ADD MACHINE</span>
        </button>
      </div>

      <!-- STATUS MESSAGE -->
      <div class="status-msg" id="statusMsg"></div>
    </div>

    <!-- RECENT ADDITIONS -->
    <div class="recent-section">
      <div class="section-header">
        <span class="section-label">RECENTLY ADDED</span>
      </div>
      <div id="recentList" class="recent-list">
        <div class="loading-row"><span class="spinner"></span> Loading...</div>
      </div>
    </div>

  </section>

  <script src="api.js"></script>
  <script src="tree.js"></script>
  <script src="add.js"></script>
</body>
</html>
